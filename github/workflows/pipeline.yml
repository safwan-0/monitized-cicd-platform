# pipeline.yml
# ============================================================
# Main CI/CD security pipeline
# Runs on every push to main branch
# Stage 1 — Security scanning (parallel jobs)
# Stage 2 — Plan and cost estimate
# Stage 3 — Manual approval
# Stage 4 — Deploy and verify
# ============================================================

name: Secure CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# restrict all jobs to read only by default
# individual jobs add more permissions only if needed
permissions:
  contents: read

jobs:

  # ==========================================================
  # STAGE 1 — SECURITY SCANNING
  # All four jobs run in parallel
  # All must pass before stage 2 starts
  # ==========================================================

  secret-scan:
    name: "Stage 1 - Secret Scan"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Trivy secret scan
        uses: aquasecurity/trivy-action@76071ef0d7ec797419534a183b498b4d6366cf37
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "secret"
          severity: "HIGH,CRITICAL"
          exit-code: "1"

  iac-scan:
    name: "Stage 1 - IaC Scan"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Checkov scan
        uses: bridgecrewio/checkov-action@9b7c4a394966fb181cf9b73fb1b8ead4b64cf0ce
        with:
          directory: infrastructure
          framework: terraform
          soft_fail: false

      - name: tfsec scan
        uses: aquasecurity/tfsec-action@b466648d6e39e7c75324f25d83891162a721f2d6
        with:
          working_directory: infrastructure
          soft_fail: false

  python-scan:
    name: "Stage 1 - Python Scan"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Bandit Python security scan
        uses: PyCQA/bandit-action@v1
        with:
          targets: "scripts/"
          level: medium
          confidence: medium

      - name: Safety dependency check
        run: |
          pip3 install safety --break-system-packages
          safety check --full-report
        continue-on-error: true

  shellcheck:
    name: "Stage 1 - Shell Script Scan"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: ShellCheck scan
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "./runner-setup"
          severity: warning

  # ==========================================================
  # STAGE 2 — PLAN AND COST ESTIMATE
  # Only runs after all stage 1 jobs pass
  # ==========================================================

  terraform-plan:
    name: "Stage 2 - Terraform Plan"
    runs-on: ubuntu-latest
    needs:
      - secret-scan
      - iac-scan
      - python-scan
      - shellcheck
    permissions:
      contents: read
      id-token: write       # needed for OIDC
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269ef065
        with:
          terraform_version: "1.6.0"

      - name: Terraform init
        working-directory: infrastructure
        run: terraform init

      - name: Terraform plan
        working-directory: infrastructure
        run: terraform plan -out=tfplan

      - name: Save plan artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: tfplan
          path: infrastructure/tfplan

  cost-estimate:
    name: "Stage 2 - Cost Estimate"
    runs-on: ubuntu-latest
    needs:
      - secret-scan
      - iac-scan
      - python-scan
      - shellcheck
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Infracost
        uses: infracost/actions/setup@e0d60d25f3df98ca0e7e50b6cfe6a1c3c8c08b52
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate cost estimate
        working-directory: infrastructure
        run: |
          infracost breakdown --path . \
            --format table \
            --out-file infracost-report.txt
          cat infracost-report.txt

      - name: Save cost report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: cost-report
          path: infrastructure/infracost-report.txt

  # ==========================================================
  # STAGE 3 — MANUAL APPROVAL
  # Pipeline pauses here
  # You review plan and cost before deploying
  # ==========================================================

  approve:
    name: "Stage 3 - Approve Deployment"
    runs-on: ubuntu-latest
    needs:
      - terraform-plan
      - cost-estimate
    environment: production
    steps:
      - name: Deployment approved
        run: echo "Deployment approved - proceeding to deploy"

  # ==========================================================
  # STAGE 4 — DEPLOY AND VERIFY
  # Runs on self-hosted runner inside your VPC
  # ==========================================================

  deploy:
    name: "Stage 4 - Deploy"
    runs-on: [self-hosted, aws, production]
    needs: approve
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269ef065
        with:
          terraform_version: "1.6.0"

      - name: Download plan artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: tfplan
          path: infrastructure/

      - name: Terraform init
        working-directory: infrastructure
        run: terraform init

      - name: Terraform apply
        working-directory: infrastructure
        run: terraform apply -auto-approve tfplan

  verify:
    name: "Stage 4 - Verify Deployment"
    runs-on: [self-hosted, aws, production]
    needs: deploy
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install Python dependencies
        run: pip3 install boto3 --break-system-packages

      - name: Run verification script
        env:
          ENVIRONMENT:        ${{ vars.ENVIRONMENT }}
          AWS_REGION:         ${{ secrets.AWS_REGION }}
          ARTIFACTS_BUCKET:   ${{ secrets.ARTIFACTS_BUCKET }}
          CLOUDTRAIL_NAME:    ${{ secrets.CLOUDTRAIL_NAME }}
          RUNNER_INSTANCE_ID: ${{ secrets.RUNNER_INSTANCE_ID }}
          SNS_TOPIC_ARN:      ${{ secrets.SNS_TOPIC_ARN }}
        run: python3 scripts/verify-deploy.py
